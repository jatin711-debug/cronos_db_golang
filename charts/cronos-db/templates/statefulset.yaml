apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "cronos-db.fullname" . }}
  labels:
    {{- include "cronos-db.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "cronos-db.headlessServiceName" . }}
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "cronos-db.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "cronos-db.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "cronos-db.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}{{- if .Values.image.digest }}@{{ .Values.image.digest }}{{- else }}:{{ .Values.image.tag | default .Chart.AppVersion }}{{- end }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: CRONOS_NODE_ID
              value: "$(POD_NAME)"
            {{- if .Values.tls.enabled }}
            - name: CRONOS_TLS_ENABLED
              value: "true"
            - name: CRONOS_TLS_CERT_FILE
              value: "/etc/cronos/tls/tls.crt"
            - name: CRONOS_TLS_KEY_FILE
              value: "/etc/cronos/tls/tls.key"
            {{- if .Values.tls.caCertEnabled }}
            - name: CRONOS_TLS_CA_FILE
              value: "/etc/cronos/tls/ca.crt"
            {{- end }}
            {{- end }}
            {{- if .Values.auth.enabled }}
            - name: CRONOS_AUTH_ENABLED
              value: "true"
            - name: CRONOS_AUTH_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-auth" (include "cronos-db.fullname" .)) .Values.auth.existingSecret }}
                  key: {{ .Values.auth.secretKey | default "jwt-secret" }}
            {{- end }}
            {{- if .Values.encryption.enabled }}
            - name: CRONOS_ENCRYPTION_ENABLED
              value: "true"
            - name: CRONOS_ENCRYPTION_KEY_FILE
              value: "/etc/cronos/encryption/master.key"
            {{- end }}
            {{- if .Values.replicationTLS.enabled }}
            - name: CRONOS_REPLICATION_TLS_ENABLED
              value: "true"
            - name: CRONOS_REPLICATION_TLS_CERT_FILE
              value: "/etc/cronos/replication-tls/tls.crt"
            - name: CRONOS_REPLICATION_TLS_KEY_FILE
              value: "/etc/cronos/replication-tls/tls.key"
            {{- if .Values.replicationTLS.caCertEnabled }}
            - name: CRONOS_REPLICATION_TLS_CA_FILE
              value: "/etc/cronos/replication-tls/ca.crt"
            {{- end }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "cronos-db.fullname" . }}
          ports:
            - name: grpc
              containerPort: {{ .Values.service.grpcPort }}
              protocol: TCP
            - name: http
              containerPort: {{ .Values.service.httpPort }}
              protocol: TCP
            - name: gossip
              containerPort: {{ .Values.headlessService.gossipPort }}
              protocol: TCP
            - name: cluster-grpc
              containerPort: {{ .Values.headlessService.clusterGRPCPort }}
              protocol: TCP
            - name: raft
              containerPort: {{ .Values.headlessService.raftPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.config.dataDir }}
            {{- if .Values.tls.enabled }}
            - name: tls
              mountPath: /etc/cronos/tls
              readOnly: true
            {{- end }}
            {{- if .Values.auth.enabled }}
            - name: auth
              mountPath: /etc/cronos/auth
              readOnly: true
            {{- end }}
            {{- if .Values.encryption.enabled }}
            - name: encryption
              mountPath: /etc/cronos/encryption
              readOnly: true
            {{- end }}
            {{- if .Values.replicationTLS.enabled }}
            - name: replication-tls
              mountPath: /etc/cronos/replication-tls
              readOnly: true
            {{- end }}
      volumes:
        {{- if .Values.tls.enabled }}
        - name: tls
          secret:
            secretName: {{ .Values.tls.existingSecret }}
        {{- end }}
        {{- if .Values.auth.enabled }}
        - name: auth
          secret:
            secretName: {{ default (printf "%s-auth" (include "cronos-db.fullname" .)) .Values.auth.existingSecret }}
        {{- end }}
        {{- if .Values.encryption.enabled }}
        - name: encryption
          secret:
            secretName: {{ .Values.encryption.existingSecret }}
        {{- end }}
        {{- if .Values.replicationTLS.enabled }}
        - name: replication-tls
          secret:
            secretName: {{ .Values.replicationTLS.existingSecret }}
        {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - {{ .Values.persistence.accessMode }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- end }}
