replicaCount: 3

image:
  repository: johnny711dock/cronos-db
  pullPolicy: IfNotPresent
  # tag defaults to .Chart.AppVersion when empty.
  tag: ""
  # Optional image digest; when set, it takes precedence over tag.
  digest: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2000m
    memory: 4Gi

nodeSelector: {}

tolerations: []

affinity: {}

podDisruptionBudget:
  enabled: true

persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 10Gi

service:
  type: ClusterIP
  grpcPort: 9000
  httpPort: 8080

headlessService:
  gossipPort: 7946
  clusterGRPCPort: 7947
  raftPort: 7948

config:
  # Default to developer mode for easy local/CI installs. Production must set
  # dev=false and provide TLS, auth, and encryption-at-rest configuration.
  dev: true
  nodeIdPrefix: "cronos-node"
  dataDir: /data
  partitionCount: 8
  replicationFactor: 3
  minInSyncReplicas: 1
  fsyncMode: every_event
  segmentSizeBytes: 536870912
  indexInterval: 1000
  flushIntervalMs: 100
  tickMs: 100
  wheelSize: 60
  # Dedup TTL: 24h is too aggressive for production backfill; 168h = 7 days.
  dedupTTLHours: 168
  bloomCapacity: 1000000
  exactlyOnceCommits: false
  tracingEnabled: false
  tracingExporter: otlp
  tracingOTLPEndpoint: ""
  tracingSampleRatio: 0.01
  tracingInsecure: true

# Enable only when TLS certificates are provided via secrets.
tls:
  enabled: false
  caCertEnabled: false
  # existingSecret: cronos-db-tls

# Enable only when an authentication secret is provided.
auth:
  enabled: false
  # existingSecret: cronos-db-auth
  # secretKey: jwt-secret

# Enable only when an encryption key secret is provided.
encryption:
  enabled: false
  # existingSecret: cronos-db-encryption
  # secretKey: master.key

# Enable only when replication mTLS certificates are provided via secrets.
replicationTLS:
  enabled: false
  caCertEnabled: false
  # existingSecret: cronos-db-replication-tls

metrics:
  enabled: true
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}

alerts:
  enabled: false
