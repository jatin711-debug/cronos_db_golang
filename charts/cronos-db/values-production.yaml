# Production overrides for CronosDB.
replicaCount: 5

image:
  pullPolicy: Always
  # Pin to chart appVersion digest in production for reproducible deployments.
  tag: ""
  digest: ""

resources:
  requests:
    cpu: 2000m
    memory: 4Gi
  limits:
    cpu: 4000m
    memory: 8Gi

persistence:
  size: 100Gi

config:
  replicationFactor: 3
  # batch = durable-high-throughput; periodic risks more data loss.
  fsyncMode: batch
  partitionCount: 32
  # 7 days dedup TTL to tolerate backfills and replays.
  dedupTTLHours: 168

metrics:
  enabled: true
  serviceMonitor:
    enabled: true

alerts:
  enabled: true

podDisruptionBudget:
  enabled: true
