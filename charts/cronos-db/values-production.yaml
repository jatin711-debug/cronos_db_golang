# Production overrides for CronosDB.
replicaCount: 5

image:
  pullPolicy: Always
  # Pin to chart appVersion digest in production for reproducible deployments.
  tag: ""
  digest: ""

resources:
  requests:
    cpu: 2000m
    memory: 4Gi
  limits:
    cpu: 4000m
    memory: 8Gi

persistence:
  size: 100Gi

config:
  dev: false
  replicationFactor: 3
  minInSyncReplicas: 2
  # batch = durable-high-throughput; periodic risks more data loss.
  fsyncMode: batch
  partitionCount: 32
  # 7 days dedup TTL to tolerate backfills and replays.
  dedupTTLHours: 168
  exactlyOnceCommits: true

metrics:
  enabled: true
  serviceMonitor:
    enabled: true

alerts:
  enabled: true

podDisruptionBudget:
  enabled: true

# Production requires TLS, auth, encryption at rest, and replication mTLS.
# Create the referenced secrets (or use cert-manager) before installing.
tls:
  enabled: true
  existingSecret: cronos-db-tls
  caCertEnabled: true

auth:
  enabled: true
  existingSecret: cronos-db-auth
  secretKey: jwt-secret

encryption:
  enabled: true
  existingSecret: cronos-db-encryption

replicationTLS:
  enabled: true
  existingSecret: cronos-db-replication-tls
  caCertEnabled: true
