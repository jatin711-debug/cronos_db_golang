# Production overrides for CronosDB.
replicaCount: 5

image:
  pullPolicy: Always

resources:
  requests:
    cpu: 2000m
    memory: 4Gi
  limits:
    cpu: 4000m
    memory: 8Gi

persistence:
  size: 100Gi

config:
  replicationFactor: 3
  fsyncMode: every_event
  partitionCount: 32

metrics:
  enabled: true
  serviceMonitor:
    enabled: true

alerts:
  enabled: true
