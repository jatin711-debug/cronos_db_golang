name: CI

on:
  push:
    branches: [main, developement]
  pull_request:
    branches: [main, developement]

# Cancel in-progress runs for the same ref when a new commit is pushed.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------------------------------- #
  # Build + unit-test matrix. Cross-compiles for linux/amd64 (the production
  # target) and builds/tests natively on windows/amd64 (the dev platform).
  # The rust dedup cgo library is built once per OS and cached.
  # --------------------------------------------------------------------------- #
  build-test:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            internal/dedup/rust/target
          key: ${{ matrix.os }}-cargo-${{ hashFiles('internal/dedup/rust/Cargo.lock', 'internal/dedup/rust/Cargo.toml') }}
          restore-keys: ${{ matrix.os }}-cargo-

      - name: Build Rust dedup library
        run: make rust-dedup

      # Strict go vet runs on Linux only. The Windows build contains a known
      # vet false-positive in mmap_windows.go (uintptr->unsafe.Pointer for a
      # genuine Win32 MapViewOfFile handle), which the unsafeptr analyzer flags
      # but is the documented idiom. The equivalent linux code vets clean.
      - name: go vet
        if: matrix.os == 'ubuntu-latest'
        run: go vet ./...

      - name: go build (native)
        run: go build ./...

      # Prove the storage package (and the whole module) cross-compiles for the
      # production target. linux builds run on ubuntu; windows confirms native.
      - name: Cross-compile for linux/amd64
        if: matrix.os == 'ubuntu-latest'
        run: GOOS=linux GOARCH=amd64 go build ./...

      # Unit tests only — integration/chaos need a live cluster (see the
      # integration job). Exclude tests/integration and tests/chaos packages.
      - name: Unit tests
        shell: bash
        run: |
          set -e
          # The race detector requires cgo, which on Windows also requires the
          # rust lib to be loadable at test time. Run with -race on linux only.
          if [ "$RUNNER_OS" = "Linux" ]; then
            CGO_ENABLED=1 go test -race $({ go list ./... 2>/dev/null || true; } | grep -vE '/tests/integration|/tests/chaos')
          else
            go test $({ go list ./... 2>/dev/null || true; } | grep -vE '/tests/integration|/tests/chaos')
          fi

  # --------------------------------------------------------------------------- #
  # Lint: gofmt + go vet, enforced as a clean gate.
  # --------------------------------------------------------------------------- #
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: gofmt
        # Flag genuine gofmt violations, ignoring CRLF line-ending differences.
        # The repo currently has mixed line endings (core.autocrlf), which would
        # otherwise make gofmt report every file; stripping CR first isolates
        # real formatting issues.
        run: |
          status=0
          while IFS= read -r -d '' f; do
            # gofmt of the CR-stripped file should equal the CR-stripped file.
            if ! diff -q <(tr -d '\r' < "$f" | gofmt) <(tr -d '\r' < "$f") >/dev/null 2>&1; then
              echo "$f"
              status=1
            fi
          done < <(find . -name '*.go' -not -path './vendor/*' -print0)
          exit $status
      - name: go vet
        run: go vet ./...

  # --------------------------------------------------------------------------- #
  # Helm chart lint. Skipped if helm is unavailable or the chart is unchanged.
  # --------------------------------------------------------------------------- #
  helm:
    name: Helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0
      - name: helm lint (default values)
        run: helm lint charts/cronos-db
      - name: helm lint (production values)
        run: helm lint charts/cronos-db -f charts/cronos-db/values-production.yaml
      - name: helm template (renders without error)
        run: helm template charts/cronos-db > /dev/null

  # --------------------------------------------------------------------------- #
  # Dependency vulnerability scan.
  # --------------------------------------------------------------------------- #
  vuln:
    name: Govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...

  # --------------------------------------------------------------------------- #
  # Integration suite: brings up the docker-compose cluster and runs the
  # tests/integration package against it. Manual + nightly so it doesn't block
  # every PR (it needs a real cluster), but does run on main/developement.
  # --------------------------------------------------------------------------- #
  integration:
    name: Integration (docker-compose)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'run-integration')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: dtolnay/rust-toolchain@stable
      - name: Build Rust dedup library
        run: make rust-dedup
      - name: Bring up cluster
        run: |
          docker compose up -d cronos-node1 cronos-node2 cronos-node3
          # Wait for node1 to become healthy.
          for i in $(seq 1 60); do
            if curl -sf http://localhost:9000/health >/dev/null 2>&1; then
              echo "Cluster healthy"; exit 0
            fi
            sleep 2
          done
          echo "Cluster did not become healthy in time"; docker compose logs; exit 1
      - name: Run integration tests
        env:
          CRONOS_TEST_ADDR: localhost:9000
          CRONOS_TEST_INTEGRATION: "1"
        run: make test-integration
      - name: Dump cluster logs on failure
        if: failure()
        run: docker compose logs
