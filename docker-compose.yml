# =============================================================================
# CronosDB Docker Compose - Development & Production
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Single Node (for development/testing)
  # ---------------------------------------------------------------------------
  cronos-single:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cronos-single
    image: cronos-db:latest
    command:
      - --dev
      - --data-dir=/data
      - --raft-dir=/data/raft
      - --fsync-mode=periodic
      - --flush-interval=50
      - --index-interval=4096
      - --segment-size=1073741824
      - --partition-count=16
      - --replication-factor=1
      - --virtual-nodes=2048
      - --max-credits=50000
      - --ack-timeout=60s
    ports:
      - "9000:9000"   # gRPC
      - "8080:8080"   # HTTP (health checks + admin dashboard /ui)
    volumes:
      - cronos-data:/data
    environment:
      - CRONOS_NODE_ID=single-node
      - CRONOS_DATA_DIR=/data
      - CRONOS_GRPC_ADDR=0.0.0.0:9000
      - CRONOS_HTTP_ADDR=0.0.0.0:8080
      - CRONOS_CLUSTER=false
      - CRONOS_TRACING_ENABLED=${CRONOS_TRACING_ENABLED:-false}
      - CRONOS_TRACING_EXPORTER=${CRONOS_TRACING_EXPORTER:-otlp}
      - CRONOS_TRACING_OTLP_ENDPOINT=${CRONOS_TRACING_OTLP_ENDPOINT:-otel-collector:4317}
      - CRONOS_TRACING_SAMPLE_RATIO=${CRONOS_TRACING_SAMPLE_RATIO:-0.01}
      - CRONOS_TRACING_INSECURE=${CRONOS_TRACING_INSECURE:-true}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3

  # ---------------------------------------------------------------------------
  # Cluster Node 1 (Leader)
  # ---------------------------------------------------------------------------
  cronos-node1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cronos-node1
    image: cronos-db:latest
    command:
      - --dev
      - --data-dir=/data
      - --raft-dir=/data/raft
      - --node-id=node1
      - --cluster
      - --cluster-seeds=
      - --cluster-raft-addr=cronos-node1:7948
      - --fsync-mode=periodic
      - --flush-interval=50
      - --index-interval=4096
      - --segment-size=1073741824
      - --partition-count=16
      - --replication-factor=3
      - --min-insync-replicas=2
      - --virtual-nodes=2048
      - --max-credits=50000
      - --ack-timeout=60s
    ports:
      - "9000:9000"   # gRPC
      - "8080:8080"   # HTTP (health checks + admin dashboard /ui)
      - "7946:7946"   # Cluster gossip
      - "7947:7947"   # Cluster gRPC
      - "7948:7948"   # Raft
    volumes:
      - node1-data:/data
    environment:
      - CRONOS_NODE_ID=node1
      - CRONOS_DATA_DIR=/data
      - CRONOS_GRPC_ADDR=0.0.0.0:9000
      - CRONOS_HTTP_ADDR=0.0.0.0:8080
      - CRONOS_CLUSTER=true
      - CRONOS_TRACING_ENABLED=${CRONOS_TRACING_ENABLED:-false}
      - CRONOS_TRACING_EXPORTER=${CRONOS_TRACING_EXPORTER:-otlp}
      - CRONOS_TRACING_OTLP_ENDPOINT=${CRONOS_TRACING_OTLP_ENDPOINT:-otel-collector:4317}
      - CRONOS_TRACING_SAMPLE_RATIO=${CRONOS_TRACING_SAMPLE_RATIO:-0.01}
      - CRONOS_TRACING_INSECURE=${CRONOS_TRACING_INSECURE:-true}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3

  # ---------------------------------------------------------------------------
  # Cluster Node 2 (Follower)
  # ---------------------------------------------------------------------------
  cronos-node2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cronos-node2
    image: cronos-db:latest
    command:
      - --dev
      - --data-dir=/data
      - --raft-dir=/data/raft
      - --node-id=node2
      - --cluster
      - --cluster-seeds=cronos-node1:7946
      - --cluster-raft-addr=cronos-node2:7948
      - --fsync-mode=periodic
      - --flush-interval=50
      - --index-interval=4096
      - --segment-size=1073741824
      - --partition-count=16
      - --replication-factor=3
      - --min-insync-replicas=2
      - --virtual-nodes=2048
      - --max-credits=50000
      - --ack-timeout=60s
    ports:
      - "9001:9000"   # gRPC (host port 9001 -> container 9000)
      - "8081:8080"   # HTTP (health checks + admin dashboard /ui)
      - "7956:7946"   # Cluster gossip
      - "7957:7947"   # Cluster gRPC
      - "7958:7948"   # Raft
    volumes:
      - node2-data:/data
    environment:
      - CRONOS_NODE_ID=node2
      - CRONOS_DATA_DIR=/data
      - CRONOS_GRPC_ADDR=0.0.0.0:9000
      - CRONOS_HTTP_ADDR=0.0.0.0:8080
      - CRONOS_CLUSTER=true
      - CRONOS_TRACING_ENABLED=${CRONOS_TRACING_ENABLED:-false}
      - CRONOS_TRACING_EXPORTER=${CRONOS_TRACING_EXPORTER:-otlp}
      - CRONOS_TRACING_OTLP_ENDPOINT=${CRONOS_TRACING_OTLP_ENDPOINT:-otel-collector:4317}
      - CRONOS_TRACING_SAMPLE_RATIO=${CRONOS_TRACING_SAMPLE_RATIO:-0.01}
      - CRONOS_TRACING_INSECURE=${CRONOS_TRACING_INSECURE:-true}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    depends_on:
      - cronos-node1

  # ---------------------------------------------------------------------------
  # Cluster Node 3 (Follower)
  # ---------------------------------------------------------------------------
  cronos-node3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cronos-node3
    image: cronos-db:latest
    command:
      - --dev
      - --data-dir=/data
      - --raft-dir=/data/raft
      - --node-id=node3
      - --cluster
      - --cluster-seeds=cronos-node1:7946
      - --cluster-raft-addr=cronos-node3:7948
      - --fsync-mode=periodic
      - --flush-interval=50
      - --index-interval=4096
      - --segment-size=1073741824
      - --partition-count=16
      - --replication-factor=3
      - --min-insync-replicas=2
      - --virtual-nodes=2048
      - --max-credits=50000
      - --ack-timeout=60s
    ports:
      - "9002:9000"   # gRPC
      - "8082:8080"   # HTTP (health checks + admin dashboard /ui)
      - "7966:7946"   # Cluster gossip
      - "7967:7947"   # Cluster gRPC
      - "7968:7948"   # Raft
    volumes:
      - node3-data:/data
    environment:
      - CRONOS_NODE_ID=node3
      - CRONOS_DATA_DIR=/data
      - CRONOS_GRPC_ADDR=0.0.0.0:9000
      - CRONOS_HTTP_ADDR=0.0.0.0:8080
      - CRONOS_CLUSTER=true
      - CRONOS_TRACING_ENABLED=${CRONOS_TRACING_ENABLED:-false}
      - CRONOS_TRACING_EXPORTER=${CRONOS_TRACING_EXPORTER:-otlp}
      - CRONOS_TRACING_OTLP_ENDPOINT=${CRONOS_TRACING_OTLP_ENDPOINT:-otel-collector:4317}
      - CRONOS_TRACING_SAMPLE_RATIO=${CRONOS_TRACING_SAMPLE_RATIO:-0.01}
      - CRONOS_TRACING_INSECURE=${CRONOS_TRACING_INSECURE:-true}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    depends_on:
      - cronos-node1

  # ---------------------------------------------------------------------------
  # Observability stack (optional profile)
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: cronos-prometheus
    profiles: ["observability"]
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  tempo:
    image: grafana/tempo:2.6.1
    container_name: cronos-tempo
    profiles: ["observability"]
    # Local dev: named volume may be root-owned; run Tempo as root to avoid
    # /tmp/tempo permission errors on startup.
    user: "0:0"
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    ports:
      - "3200:3200"
    volumes:
      - ./observability/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/tmp/tempo

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.107.0
    container_name: cronos-otel-collector
    profiles: ["observability"]
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    ports:
      - "4317:4317"   # OTLP gRPC (for host-based make node1/node2/node3)
      - "4318:4318"   # OTLP HTTP
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      - tempo

  grafana:
    image: grafana/grafana:11.2.0
    container_name: cronos-grafana
    profiles: ["observability"]
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - tempo

# =============================================================================
# Volumes - Named volumes for persistent data
# =============================================================================
volumes:
  # Single node volume
  cronos-data:
    driver: local

  # Cluster node volumes (each node has its own data)
  node1-data:
    driver: local
  node2-data:
    driver: local
  node3-data:
    driver: local

  # Observability volumes
  grafana-data:
    driver: local
  tempo-data:
    driver: local
